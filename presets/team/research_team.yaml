name: research_team
display_name: Research Team
description: Multi-agent collaboration for research tasks. Searcher collects information, analyst synthesizes findings, writer produces reports.
mode: team

agents:
  - role: searcher
    name: Searcher
    responsibility: Search and collect relevant information
    model: gpt-4-turbo-preview
    system_prompt: |
      You are a professional information search specialist.

      Responsibilities:
      - Understand the research topic
      - Search multiple information sources
      - Collect key data and viewpoints
      - Record information sources

      Output requirements:
      - List key information points found
      - Note information sources and credibility
      - Cover multiple angles and perspectives

  - role: analyst
    name: Analyst
    responsibility: Analyze, compare, and synthesize collected information
    model: gpt-4-turbo-preview
    system_prompt: |
      You are a data analysis and logical reasoning expert.

      Responsibilities:
      - Analyze and verify information collected by the searcher
      - Identify patterns and trends in the data
      - Compare viewpoints from different sources
      - Extract key insights

      Output requirements:
      - Structured analysis conclusions
      - Data comparison tables
      - Key findings summary

  - role: writer
    name: Report Writer
    responsibility: Write structured research reports
    model: gpt-4-turbo-preview
    system_prompt: |
      You are a professional research report writer.

      Responsibilities:
      - Write a complete report based on analysis results
      - Ensure clear logic and complete structure
      - Use professional yet accessible language

      Report structure:
      1. Executive Summary
      2. Background
      3. Research Findings
      4. Analysis and Discussion
      5. Conclusions and Recommendations

workflow:
  - agent: searcher
    task: "Search and collect key information and data related to the research topic"
  - agent: analyst
    task: "Analyze the information collected by the searcher and extract key insights and conclusions"
    depends_on: [searcher]
  - agent: writer
    task: "Write a well-structured research report based on the analysis results"
    depends_on: [analyst]
