version: '3.8'

services:
  api:
    build:
      context: .
      dockerfile: Dockerfile.api
    container_name: agentforge-api
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL=postgresql+asyncpg://agentforge:agentforge@db:5432/agentforge
      - REDIS_URL=redis://redis:6379/0
      - CHROMA_HOST=chroma
      - CHROMA_PORT=8000
    volumes:
      - ./backend:/app/backend
      - ./presets:/app/presets
      - ./data:/app/data
    depends_on:
      - db
      - redis
    restart: unless-stopped

  web:
    build:
      context: .
      dockerfile: Dockerfile.web
    container_name: agentforge-web
    ports:
      - "3000:3000"
    environment:
      - NEXT_PUBLIC_API_URL=http://api:8000
    depends_on:
      - api
    restart: unless-stopped

  db:
    image: postgres:15-alpine
    container_name: agentforge-db
    ports:
      - "5432:5432"
    environment:
      - POSTGRES_USER=agentforge
      - POSTGRES_PASSWORD=agentforge
      - POSTGRES_DB=agentforge
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    container_name: agentforge-redis
    ports:
      - "6379:6379"
    restart: unless-stopped

  chroma:
    image: chromadb/chroma:latest
    container_name: agentforge-chroma
    ports:
      - "8100:8000"
    volumes:
      - chroma_data:/chroma/chroma
    restart: unless-stopped

volumes:
  postgres_data:
  chroma_data:
