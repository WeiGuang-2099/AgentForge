apiVersion: v1
kind: Service
metadata:
  name: agentforge-api
  namespace: agentforge
  labels:
    app: agentforge-api
    app.kubernetes.io/name: agentforge-api
    app.kubernetes.io/component: api
    app.kubernetes.io/part-of: agentforge
spec:
  type: ClusterIP
  ports:
    - port: 8000
      targetPort: 8000
      protocol: TCP
      name: http
  selector:
    app: agentforge-api
---
apiVersion: v1
kind: Service
metadata:
  name: agentforge-web
  namespace: agentforge
  labels:
    app: agentforge-web
    app.kubernetes.io/name: agentforge-web
    app.kubernetes.io/component: web
    app.kubernetes.io/part-of: agentforge
spec:
  type: ClusterIP
  ports:
    - port: 3000
      targetPort: 3000
      protocol: TCP
      name: http
  selector:
    app: agentforge-web
---
apiVersion: v1
kind: Service
metadata:
  name: agentforge-db
  namespace: agentforge
  labels:
    app: agentforge-db
    app.kubernetes.io/name: agentforge-db
    app.kubernetes.io/component: database
    app.kubernetes.io/part-of: agentforge
spec:
  type: ClusterIP
  ports:
    - port: 5432
      targetPort: 5432
      protocol: TCP
      name: postgres
  selector:
    app: agentforge-db
---
apiVersion: v1
kind: Service
metadata:
  name: agentforge-redis
  namespace: agentforge
  labels:
    app: agentforge-redis
    app.kubernetes.io/name: agentforge-redis
    app.kubernetes.io/component: cache
    app.kubernetes.io/part-of: agentforge
spec:
  type: ClusterIP
  ports:
    - port: 6379
      targetPort: 6379
      protocol: TCP
      name: redis
  selector:
    app: agentforge-redis
