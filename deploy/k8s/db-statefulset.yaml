apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: agentforge-db
  namespace: agentforge
  labels:
    app: agentforge-db
    app.kubernetes.io/name: agentforge-db
    app.kubernetes.io/component: database
    app.kubernetes.io/part-of: agentforge
spec:
  serviceName: agentforge-db
  replicas: 1
  selector:
    matchLabels:
      app: agentforge-db
  template:
    metadata:
      labels:
        app: agentforge-db
    spec:
      containers:
        - name: postgres
          image: postgres:15-alpine
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 5432
              protocol: TCP
          resources:
            requests:
              memory: "256Mi"
              cpu: "250m"
            limits:
              memory: "512Mi"
              cpu: "500m"
          env:
            - name: POSTGRES_USER
              valueFrom:
                secretKeyRef:
                  name: agentforge-secrets
                  key: postgres-user
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: agentforge-secrets
                  key: postgres-password
            - name: POSTGRES_DB
              value: agentforge
            - name: PGDATA
              value: /var/lib/postgresql/data/pgdata
          volumeMounts:
            - name: postgres-data
              mountPath: /var/lib/postgresql/data
          readinessProbe:
            exec:
              command:
                - pg_isready
                - -U
                - agentforge
            initialDelaySeconds: 10
            periodSeconds: 10
          livenessProbe:
            exec:
              command:
                - pg_isready
                - -U
                - agentforge
            initialDelaySeconds: 30
            periodSeconds: 15
  volumeClaimTemplates:
    - metadata:
        name: postgres-data
      spec:
        accessModes:
          - ReadWriteOnce
        resources:
          requests:
            storage: 10Gi
