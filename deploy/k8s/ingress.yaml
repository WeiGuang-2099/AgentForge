apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: agentforge-ingress
  namespace: agentforge
  labels:
    app.kubernetes.io/name: agentforge-ingress
    app.kubernetes.io/part-of: agentforge
  annotations:
    nginx.ingress.kubernetes.io/proxy-body-size: "50m"
    nginx.ingress.kubernetes.io/proxy-read-timeout: "3600"
    nginx.ingress.kubernetes.io/proxy-send-timeout: "3600"
    nginx.ingress.kubernetes.io/websocket-services: "agentforge-api"
spec:
  ingressClassName: nginx
  rules:
    - host: agentforge.example.com
      http:
        paths:
          - path: /api
            pathType: Prefix
            backend:
              service:
                name: agentforge-api
                port:
                  number: 8000
          - path: /ws
            pathType: Prefix
            backend:
              service:
                name: agentforge-api
                port:
                  number: 8000
          - path: /
            pathType: Prefix
            backend:
              service:
                name: agentforge-web
                port:
                  number: 3000
